
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Weather Dashboard</title>
<!-- 🔄 Auto refresh every 5 minutes -->
<meta http-equiv="refresh" content="300">

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 1.8rem;
    font-weight: 700;
}

main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
}

.card {
    width: 100%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 24px;
    padding: 2.5rem;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
}

.icon {
    font-size: 6rem;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
}

.temp {
    font-size: 3.5rem;
    font-weight: 800;
    margin: 0.5rem 0;
    background: linear-gradient(to bottom, #fff, #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.condition {
    font-size: 1.4rem;
    font-weight: 500;
    margin-bottom: 2rem;
    color: #94a3b8;
    text-transform: capitalize;
}

.details {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    margin-bottom: 2rem;
    text-align: left;
    background: rgba(0, 0, 0, 0.2);
    padding: 1.5rem;
    border-radius: 16px;
}

.detail-item {
    display: flex;
    flex-direction: column;
}

.detail-label {
    font-size: 0.8rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.detail-value {
    font-size: 1.1rem;
    font-weight: 600;
}

.time {
    font-size: 0.85rem;
    opacity: 0.5;
    margin-top: 1rem;
}

footer {
    text-align: center;
    font-size: 0.8rem;
    opacity: 0.6;
    padding: 1.5rem;
}

@media (max-width: 480px) {
    .card { padding: 1.5rem; }
    .details { grid-template-columns: 1fr; gap: 1rem; }
}
</style>
</head>

<body>
<header>
    🌍 Kristiansand Weather
</header>

<main>
    <section class="card">
        <div class="icon">⛅</div>
        <div class="temp">8.0 °C</div>
        <div class="condition">Partly cloudy</div>
        
        <div class="details">
            <div class="detail-item">
                <span class="detail-label">Wind</span>
                <span class="detail-value">→ 4.7 m/s ENE</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Humidity</span>
                <span class="detail-value">76%</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Pressure</span>
                <span class="detail-value">1023.0 mb</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Region</span>
                <span class="detail-value">Kristiansand</span>
            </div>
        </div>

        <div class="time">
            Last updated: 2026-04-15 16:46
        </div>
    </section>
</main>

<footer>
    Auto-updates every 5 minutes • Data via WeatherAPI
</footer>
</body>
</html>
